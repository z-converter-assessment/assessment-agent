name: Release Build

# 트리거:
#   - main/develop/feature/** push → 검증 빌드 (artifact upload, retention 90일)
#   - PR → 검증 빌드 (artifact 임시)
#   - tag v* push → 검증 빌드 + GitHub Release 자동 생성 + artifact 첨부
#   - workflow_dispatch → 수동 실행 (디버깅 / ad-hoc 빌드)
on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

# 같은 PR / 브랜치 내 새 push 발생 시 이전 run 자동 취소 — 중복 빌드 / 캐시 경합 회피.
concurrency:
  group: release-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# release 잡이 GitHub Release 생성 / 첨부할 수 있도록 contents:write 필요.
permissions:
  contents: write

jobs:
  # ============================================================
  # Linux 빌드 — native amd64 runner 위에서 manylinux2014 컨테이너 사용.
  # build-linux.sh 가 docker 전체 흐름 (build-prep + vendor + agent + verify
  # + release + chown) 을 캡슐화하므로 여기서는 한 줄 호출만.
  # ============================================================
  build-linux:
    name: Linux (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Legacy (CentOS 6 / glibc 2.12) uses the archived manylinux2010 image —
    # if it ever fails to pull/build it must NOT block the modern release.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: modern (manylinux2014 / glibc 2.17)
            image: quay.io/pypa/manylinux2014_x86_64
            target: release
            artifact: assessment-agent-linux-x86_64
            binary: dist/assessment-agent-linux-x86_64
          - name: legacy (manylinux2010 / glibc 2.12 / CentOS 6)
            image: quay.io/pypa/manylinux2010_x86_64
            target: release-legacy
            artifact: assessment-agent-linux-x86_64-glibc2.12
            binary: dist/assessment-agent-linux-x86_64-glibc2.12
            experimental: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # vendor/ 는 6개 라이브러리 git clone + cmake/configure 빌드 결과를 모두 포함.
      # 프로파일별로 glibc 가 달라 정적 라이브러리가 호환되지 않으므로 target 을
      # 캐시 키에 포함해 modern/legacy vendor 를 분리한다.
      - name: Cache vendor (Linux ${{ matrix.target }})
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-linux-${{ matrix.target }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            vendor-linux-${{ matrix.target }}-

      - name: Build (Docker / ${{ matrix.image }})
        run: BUILD_IMAGE=${{ matrix.image }} BUILD_TARGET=${{ matrix.target }} ./scripts/build-linux.sh

      - name: Verify artifacts
        run: |
          test -f ${{ matrix.binary }}
          test -f dist/SHA256SUMS
          (cd dist && sha256sum -c SHA256SUMS)
          file ${{ matrix.binary }}
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.binary }}
            dist/SHA256SUMS
          retention-days: 90

  # ============================================================
  # Windows 빌드 — windows-latest runner + MSYS2 mingw64 toolchain.
  # msys2/setup-msys2 action 이 build-prep.ps1 의 MSYS2 silent install 단계를
  # 대체하므로 build-windows.ps1 우회 — make 직접 호출.
  # ============================================================
  build-windows:
    name: Windows (${{ matrix.name }})
    runs-on: windows-latest
    timeout-minutes: 60
    # legacy (Server 2003) needs an older MinGW + OpenSSL 1.0.2 that the
    # windows-latest MSYS2 toolchain may not build — never block the release.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: modern (NT10 — Server 2016~2025)
            profile: modern
            artifact: assessment-agent-windows-x86_64
            binary: assessment-agent.exe
          - name: win7 (NT6.1-6.3 — Server 2008R2~2012R2)
            profile: win7
            artifact: assessment-agent-windows-x86_64-win7
            binary: assessment-agent-win7.exe
          - name: legacy (NT5.2 — Server 2003 / XP x64)
            profile: legacy
            artifact: assessment-agent-windows-x86_64-legacy
            binary: assessment-agent-legacy.exe
            experimental: true
    defaults:
      run:
        shell: msys2 {0}
        working-directory: windows-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 + mingw64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            git
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-pkgconf
            perl

      # OpenSSL version differs per profile, so vendor static libs are not
      # interchangeable — key the cache on the profile.
      - name: Cache vendor (Windows ${{ matrix.profile }})
        uses: actions/cache@v4
        with:
          path: windows-agent/vendor
          key: vendor-windows-${{ matrix.profile }}-${{ hashFiles('windows-agent/Makefile') }}
          restore-keys: |
            vendor-windows-${{ matrix.profile }}-

      - name: Vendor fetch
        run: make PROFILE=${{ matrix.profile }} vendor-fetch

      - name: Vendor build (static)
        run: make PROFILE=${{ matrix.profile }} vendor-build

      - name: Build + release
        run: make PROFILE=${{ matrix.profile }} release

      - name: Verify artifacts
        run: |
          test -f dist/${{ matrix.binary }}
          test -f dist/SHA256SUMS
          (cd dist && sha256sum -c SHA256SUMS)
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            windows-agent/dist/${{ matrix.binary }}
            windows-agent/dist/SHA256SUMS
          retention-days: 90

  # ============================================================
  # Installer smoke — Linux runner 의 sudo + systemd 와 Windows runner 의
  # Administrator + SCM 을 활용해서 self-installer 서브커맨드를 실제로 한 번
  # 돌려봄. stdin 을 닫고 시작 → env-setup 의 prompt 가 EOF 를 받아 default
  # 로 떨어지므로 broker 자격증명 없이도 install --image-prep 까지 진입 가능.
  # 실제 service start 는 broker 가 없어 일부러 안 함 (--image-prep).
  # ============================================================
  # ------------------------------------------------------------
  # Linux installer smoke — broker(rabbitmq:3 docker) 까지 띄우고:
  #   1. install --image-prep flow  (서비스 등록만)
  #   2. install flow (broker 있는 상태에서 service start → publish 도달 검증)
  #   3. ACL / mode / ownership 검증
  #   4. 업그레이드 (install 두 번 → service stop → exe 교체 → restart)
  #   5. /tmp 임시 디렉토리 정리 확인
  #   6. dev path (deploy/install.sh + INSTALLER_SELF_PATH 미설정) 호환 검증
  #   7. uninstall (env 보존) + uninstall --purge (state + user 정리)
  # ------------------------------------------------------------
  install-smoke-linux:
    name: Linux installer smoke
    needs: build-linux
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # GHA 가 RabbitMQ 컨테이너를 띄우고 healthcheck (`rabbitmq-diagnostics ping`)
    # 통과까지 기다린 뒤 step 진행. 직접 `docker run` 보다 안정적 — 컨테이너가
    # init 중 die 하면 GHA 가 fail-fast 로 job 자체를 실패시켜 원인을 보여줌.
    services:
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 30
          --health-start-period 30s
    steps:
      - name: Checkout (dev path 검증용)
        uses: actions/checkout@v4
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: assessment-agent-linux-x86_64
          path: dist
      - name: chmod
        run: chmod +x dist/assessment-agent-linux-x86_64

      # user-level 설치는 per-user systemd manager 가 필요. CI step 은 로그인
      # 세션이 아니라 user@.service 가 안 떠 있으므로 linger 로 띄운다. 이 sudo 는
      # CI 인프라 준비용일 뿐 — 에이전트 설치 자체는 전부 비특권으로 실행된다.
      - name: A0. Setup per-user systemd manager (linger)
        run: |
          sudo loginctl enable-linger "$USER"
          for i in $(seq 1 30); do
            [ -S "/run/user/$(id -u)/bus" ] && break
            sleep 1
          done
          systemctl --user is-system-running || true

      # ---------- Phase A: --image-prep flow (user-level, no root) ----------
      - name: A1. install --image-prep (비특권)
        run: ./dist/assessment-agent-linux-x86_64 install --image-prep < /dev/null
      - name: A2. Verify registered (enabled, not active) + user paths
        run: |
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          systemctl --user is-enabled assessment-agent
          test "$(systemctl --user is-active assessment-agent || true)" != "active"
          test -f "$HOME/.config/systemd/user/assessment-agent.service"
          test -f "$HOME/.local/bin/assessment-agent"
          test -f "$HOME/.config/assessment-agent/agent.env"
          # 시스템(root) 흔적이 없어야 함 — user-level 전환의 핵심
          ! test -f /usr/local/bin/assessment-agent
          ! test -f /etc/systemd/system/assessment-agent.service
          ! id assessment-agent 2>/dev/null
      - name: A3. perms — agent.env (0640, 본인 소유)
        run: |
          mode=$(stat -c '%a' "$HOME/.config/assessment-agent/agent.env")
          own=$(stat -c '%U' "$HOME/.config/assessment-agent/agent.env")
          [ "$mode" = "640" ] || { echo "expected 640, got $mode"; exit 1; }
          [ "$own"  = "$USER" ] || { echo "expected $USER, got $own"; exit 1; }
      - name: A4. /tmp bundle cleaned
        run: |
          leftover=$(ls -d /tmp/agent-installer-* 2>/dev/null || true)
          [ -z "$leftover" ] || { echo "leftover bundle: $leftover"; exit 1; }
      - name: A5. prep-image runs (machine-id reset best-effort, 비특권)
        run: ./dist/assessment-agent-linux-x86_64 prep-image < /dev/null
      - name: A6. uninstall (config preserved)
        run: |
          ./dist/assessment-agent-linux-x86_64 uninstall < /dev/null
          ! test -f "$HOME/.config/systemd/user/assessment-agent.service"
          ! test -f "$HOME/.local/bin/assessment-agent"
          test -f "$HOME/.config/assessment-agent/agent.env"

      # ---------- Phase B: broker (services container) + full install flow ----------
      - name: B1. Wait for RabbitMQ management API
        run: |
          for i in $(seq 1 60); do
            if curl -sf -u guest:guest http://127.0.0.1:15672/api/overview >/dev/null; then break; fi
            sleep 2
          done
          curl -sf -u guest:guest http://127.0.0.1:15672/api/overview | head -c 200; echo
      - name: B2. Bootstrap exchange + queue (engine topology surrogate)
        run: |
          curl -sf -u guest:guest -o rabbitmqadmin http://127.0.0.1:15672/cli/rabbitmqadmin
          chmod +x rabbitmqadmin
          ./rabbitmqadmin declare exchange name=assessment type=direct durable=true
          ./rabbitmqadmin declare queue    name=server.metrics  durable=true
          ./rabbitmqadmin declare binding  source=assessment destination=server.metrics  routing_key=server.metrics
          ./rabbitmqadmin declare queue    name=server.inventory durable=true
          ./rabbitmqadmin declare binding  source=assessment destination=server.inventory routing_key=server.inventory
      - name: B3. Seed agent.env (user config, broker connectable, plain TCP)
        run: |
          mkdir -p "$HOME/.config/assessment-agent"
          cat > "$HOME/.config/assessment-agent/agent.env" <<'EOF'
          RABBITMQ_HOST=127.0.0.1
          RABBITMQ_PORT=5672
          RABBITMQ_VHOST=/
          RABBITMQ_USER=guest
          RABBITMQ_TLS_ENABLED=false
          RABBITMQ_EXCHANGE=assessment
          RABBITMQ_ROUTING_KEY_INVENTORY=server.inventory
          RABBITMQ_ROUTING_KEY_METRICS=server.metrics
          RABBITMQ_ROUTING_KEY_ERROR=server.error
          AGENT_INTERVAL_SEC=5
          AGENT_INVENTORY_REFRESH_SEC=0
          WORKER_DOWNLOAD_ALLOWED_HOSTS=
          EOF
          cat > "$HOME/.config/assessment-agent/agent.env.local" <<'EOF'
          RABBITMQ_PASS=guest
          EOF
          chmod 600 "$HOME/.config/assessment-agent/agent.env.local"
      - name: B4. install (no --image-prep) — user service must reach active
        run: ./dist/assessment-agent-linux-x86_64 install < /dev/null
      - name: B5. systemctl --user is-active + journal sanity
        run: |
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          systemctl --user is-active assessment-agent
          journalctl --user -u assessment-agent -n 30 --no-pager || true
      - name: B6. Publish reaches queue (metrics + inventory)
        run: |
          for i in $(seq 1 20); do
            depth=$(curl -sf -u guest:guest http://127.0.0.1:15672/api/queues/%2F/server.metrics \
                    | python3 -c 'import json,sys; print(json.load(sys.stdin).get("messages",0))' 2>/dev/null || echo 0)
            [ "$depth" -gt 0 ] && break
            sleep 2
          done
          curl -sf -u guest:guest http://127.0.0.1:15672/api/queues/%2F | \
              python3 -c 'import json,sys; [print(q["name"], q["messages"]) for q in json.load(sys.stdin)]'
          [ "$depth" -gt 0 ] || { echo "no metrics published in 40s"; exit 1; }
          # peek a message — must contain message_type=metrics
          ./rabbitmqadmin get queue=server.metrics ackmode=ack_requeue_false count=1 | tee /tmp/metric.json
          grep -q '"message_type"' /tmp/metric.json || { echo "payload missing message_type"; exit 1; }
          grep -q '"machine_id"'   /tmp/metric.json || { echo "payload missing machine_id"; exit 1; }
      - name: B7. perms — agent.env.local (0600, 본인 소유)
        run: |
          mode=$(stat -c '%a' "$HOME/.config/assessment-agent/agent.env.local")
          own=$(stat -c '%U' "$HOME/.config/assessment-agent/agent.env.local")
          [ "$mode" = "600" ] || { echo "expected 600, got $mode"; exit 1; }
          [ "$own"  = "$USER" ] || { echo "expected $USER, got $own"; exit 1; }
      - name: B8. Upgrade flow — install twice, user service stays active
        run: |
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          pid_before=$(systemctl --user show -p MainPID --value assessment-agent)
          ./dist/assessment-agent-linux-x86_64 install < /dev/null
          sleep 3
          systemctl --user is-active assessment-agent
          pid_after=$(systemctl --user show -p MainPID --value assessment-agent)
          [ "$pid_before" != "$pid_after" ] || { echo "upgrade did not restart (PID unchanged=$pid_before)"; exit 1; }
          echo "upgrade PID: $pid_before -> $pid_after"

      # ---------- Phase C: dev path (deploy/install.sh 직접, 비특권) ----------
      - name: C1. uninstall + Verify removal
        run: |
          ./dist/assessment-agent-linux-x86_64 uninstall < /dev/null
          ! test -f "$HOME/.local/bin/assessment-agent"
      - name: C2. Stage dist for dev install.sh path
        run: |
          mkdir -p dev-stage/dist
          cp dist/assessment-agent-linux-x86_64 dev-stage/dist/
          cp -r deploy dev-stage/
          (cd dev-stage/dist && sha256sum assessment-agent-linux-x86_64 > SHA256SUMS)
      - name: C3. dev path — ./deploy/install.sh (비특권, no INSTALLER_SELF_PATH)
        run: |
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          cd dev-stage
          ls -la deploy/install.sh
          head -1 deploy/install.sh
          # 운영자가 갓 클론한 repo 에서 실행하는 fallback 경로 — user-level.
          bash "$(pwd)/deploy/install.sh" < /dev/null
          systemctl --user is-active assessment-agent

      # ---------- Phase D: --purge cleanup ----------
      - name: D1. uninstall --purge wipes config + state
        run: |
          ./dist/assessment-agent-linux-x86_64 uninstall --purge < /dev/null
          ! test -d "$HOME/.config/assessment-agent"
          ! test -d "$HOME/.local/state/assessment-agent"

  # ------------------------------------------------------------
  # Windows installer smoke — chocolatey RabbitMQ 까지 띄우고:
  #   1. install --image-prep flow
  #   2. install flow (broker 있는 상태에서 service start → publish 도달)
  #   3. SCM BinaryPath 가 따옴표로 감싸졌는지 (sc qc)
  #   4. ACL — agent.env.local 이 SYSTEM + Administrators 만인지 (Get-Acl)
  #   5. 업그레이드 (install 두 번)
  #   6. uninstall + Verify
  # ------------------------------------------------------------
  install-smoke-windows:
    name: Windows installer smoke
    needs: build-windows
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: assessment-agent-windows-x86_64
          path: dist

      # ---------- Phase A: --image-prep flow (user-level, scheduled task) ----------
      - name: A1. install --image-prep
        run: $null | .\dist\assessment-agent.exe install --image-prep
      - name: A2. Verify scheduled task registered + user-level files
        run: |
          $base = Join-Path $env:LOCALAPPDATA 'assessment-agent'
          & schtasks /Query /TN AssessmentAgent | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "A2: scheduled task not registered" }
          foreach ($p in @(
              (Join-Path $base 'assessment-agent.exe'),
              (Join-Path $base 'agent.env'),
              (Join-Path $base 'worker\results'),
              (Join-Path $base 'worker\done'),
              (Join-Path $base 'worker\running'))) {
              if (-not (Test-Path $p)) { throw "A2: missing $p" }
          }
          # 시스템 경로(옛 모델) 흔적이 없어야 함
          if (Test-Path 'C:\Program Files\assessment-agent\assessment-agent.exe') { throw "A2: system path should not exist" }
      - name: A3. Task action runs the installed exe (quoted, space-safe) with 'run'
        run: |
          $out = (& schtasks /Query /TN AssessmentAgent /V /FO LIST | Out-String)
          Write-Host $out
          $exe = (Join-Path $env:LOCALAPPDATA 'assessment-agent\assessment-agent.exe')
          if ($out -notmatch [regex]::Escape($exe)) { throw "A3: task action does not reference $exe" }
          if ($out -notmatch '\brun\b') { throw "A3: task action missing 'run' argument" }
      - name: A4. prep-image runs (MachineGuid reset best-effort; needs admin)
        run: |
          $before = (Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Cryptography' MachineGuid).MachineGuid
          .\dist\assessment-agent.exe prep-image
          if ($LASTEXITCODE -ne 0) { throw "A4: prep-image exited $LASTEXITCODE" }
          $after = (Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Cryptography' MachineGuid).MachineGuid
          Write-Host "MachineGuid: $before -> $after (changed=$($before -ne $after))"
      - name: A5. uninstall (state preserved)
        run: |
          .\dist\assessment-agent.exe uninstall
          & schtasks /Query /TN AssessmentAgent 2>$null | Out-Null
          $exists = ($LASTEXITCODE -eq 0); $global:LASTEXITCODE = 0
          if ($exists) { throw "A5: task still registered" }
          if (-not (Test-Path (Join-Path $env:LOCALAPPDATA 'assessment-agent'))) { throw "A5: state dir wiped" }

      # ---------- Phase B: broker + full install flow ----------
      - name: B1. Install RabbitMQ via Chocolatey + wait for erlang node
        run: |
          choco install rabbitmq --no-progress -y
          $sbin = (Get-ChildItem 'C:\Program Files\RabbitMQ Server\*\sbin' -Directory | Select-Object -First 1).FullName
          if (-not $sbin) { throw "B1: RabbitMQ sbin not found" }
          echo "SBIN=$sbin" >> $env:GITHUB_ENV

          # In 4.x the chocolatey post-install plays with the service while
          # the listener is still binding. Do NOT Restart-Service — that races
          # with the in-progress start and leaves the erlang node in a half-up
          # state where `rabbitmq-diagnostics ping` never returns. Just poll
          # the service status first, then poll erlang readiness.
          $deadline = (Get-Date).AddMinutes(5)
          while ((Get-Date) -lt $deadline) {
              $svc = Get-Service -Name RabbitMQ -ErrorAction SilentlyContinue
              if ($svc -and $svc.Status -eq 'Running') { break }
              Start-Sleep -Seconds 3
          }
          Get-Service RabbitMQ
          if (-not $svc -or $svc.Status -ne 'Running') {
              Get-WinEvent -LogName Application -MaxEvents 30 -ErrorAction SilentlyContinue |
                  Where-Object { $_.ProviderName -match 'RabbitMQ|erlang' } |
                  Format-List TimeCreated, LevelDisplayName, Message
              throw "B1: RabbitMQ service never reached Running"
          }

          # Sync erlang cookie — service runs as SYSTEM, CI step runs as another
          # user. erlang distribution requires both sides' cookies to match,
          # otherwise rabbitmqctl/diagnostics fail with "unable to perform an
          # operation on node". Cookie location varies by chocolatey package
          # version and erlang installer — search all known spots, then fall
          # back to filesystem scan.
          $candidates = @(
              "C:\Windows\System32\config\systemprofile\.erlang.cookie",
              "C:\Windows\System32\config\systemprofile\AppData\Roaming\RabbitMQ\.erlang.cookie",
              "C:\Windows\.erlang.cookie",
              "$env:ProgramData\RabbitMQ\.erlang.cookie",
              "$env:APPDATA\RabbitMQ\.erlang.cookie"
          )
          $sysCookie = $null
          foreach ($c in $candidates) {
              if (Test-Path $c) { $sysCookie = $c; break }
          }
          if (-not $sysCookie) {
              Write-Host "Cookie not at any known location — scanning C:\ ..."
              $hits = Get-ChildItem -Path C:\ -Filter '.erlang.cookie' -Recurse -Force -ErrorAction SilentlyContinue
              $hits | Format-Table FullName, Length, LastWriteTime
              if ($hits.Count -gt 0) { $sysCookie = $hits[0].FullName }
          }
          if (-not $sysCookie) { throw "B1: no .erlang.cookie found anywhere" }
          Write-Host "Found SYSTEM cookie at: $sysCookie"
          Copy-Item -Path $sysCookie -Destination "$env:USERPROFILE\.erlang.cookie" -Force
          # Lock down ACL — some erlang versions refuse to use a world-readable cookie.
          $acl = Get-Acl "$env:USERPROFILE\.erlang.cookie"
          $acl.SetAccessRuleProtection($true, $false)
          $me  = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name
          $acl.SetAccessRule((New-Object System.Security.AccessControl.FileSystemAccessRule($me, 'FullControl', 'Allow')))
          Set-Acl "$env:USERPROFILE\.erlang.cookie" $acl
          Write-Host "Synced cookie to $env:USERPROFILE\.erlang.cookie"

          $deadline = (Get-Date).AddMinutes(3)
          while ((Get-Date) -lt $deadline) {
              & "$sbin\rabbitmq-diagnostics.bat" -q ping 2>$null
              if ($LASTEXITCODE -eq 0) { break }
              Start-Sleep -Seconds 5
          }
          if ($LASTEXITCODE -ne 0) {
              # Dump everything that helps figure out why erlang is wedged.
              & "$sbin\rabbitmqctl.bat" status 2>&1 | Out-String | Write-Host
              Get-WinEvent -LogName Application -MaxEvents 30 -ErrorAction SilentlyContinue |
                  Where-Object { $_.ProviderName -match 'RabbitMQ|erlang' } |
                  Format-List TimeCreated, LevelDisplayName, Message
              throw "B1: RabbitMQ erlang node never reached ping-ready"
          }
      - name: B2. Enable management plugin + restart + wait for HTTP API
        run: |
          & "$env:SBIN\rabbitmq-plugins.bat" enable rabbitmq_management
          # 4.x on Windows: plugin enable does NOT auto-bind the HTTP listener
          # (previous run: `rabbitmqctl status Listeners` shows only amqp/clustering
          # ports, no http endpoint). Force a restart so the management binding
          # gets registered, then wait for the node to come back.
          Restart-Service -Name RabbitMQ -Force
          $deadline = (Get-Date).AddMinutes(3)
          while ((Get-Date) -lt $deadline) {
              & "$env:SBIN\rabbitmq-diagnostics.bat" -q ping 2>$null
              if ($LASTEXITCODE -eq 0) { break }
              Start-Sleep -Seconds 5
          }
          if ($LASTEXITCODE -ne 0) {
              & "$env:SBIN\rabbitmqctl.bat" status 2>&1 | Out-String | Write-Host
              throw "B2: erlang node did not come back after restart"
          }
          $tcpOk = $false
          $deadline = (Get-Date).AddMinutes(3)
          while ((Get-Date) -lt $deadline) {
            if (Test-NetConnection -ComputerName 127.0.0.1 -Port 15672 -InformationLevel Quiet -WarningAction SilentlyContinue) {
                $tcpOk = $true; break
            }
            Start-Sleep -Seconds 3
          }
          if (-not $tcpOk) {
              Write-Host "==== rabbitmqctl status (listeners) ===="
              & "$env:SBIN\rabbitmqctl.bat" status 2>&1 | Out-String | Write-Host
              Write-Host "==== netstat 15672 ===="
              netstat -an | Select-String 15672
              throw "B2: 15672 never became reachable"
          }
          Write-Host "TCP 15672 reachable"

          # PowerShell's -Credential is lazy (it waits for a 401 challenge),
          # which can race the RabbitMQ management plugin's first-response
          # initialization. Send Authorization: Basic on the first request
          # instead so the server never has to challenge.
          $b64 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes('guest:guest'))
          $headers = @{ Authorization = "Basic $b64" }
          $apiOk = $false
          $lastErr = $null
          $deadline = (Get-Date).AddMinutes(3)
          while ((Get-Date) -lt $deadline) {
            try {
              $r = Invoke-WebRequest -Uri 'http://127.0.0.1:15672/api/overview' -Headers $headers -UseBasicParsing -TimeoutSec 5
              if ($r.StatusCode -eq 200) { $apiOk = $true; break }
            } catch { $lastErr = $_.Exception.Message }
            Start-Sleep -Seconds 3
          }
          if (-not $apiOk) {
              Write-Host "Last API error: $lastErr"
              Write-Host "==== rabbitmqctl status ===="
              & "$env:SBIN\rabbitmqctl.bat" status 2>&1 | Out-String | Write-Host
              throw "B2: management API /api/overview never answered"
          }
          Write-Host "Management API ready"

          # No rabbitmqadmin download — 4.x removed the /cli endpoint AND moved
          # the script source. We talk to the management API directly via
          # Invoke-RestMethod in subsequent steps. The Basic auth header is
          # re-exported here so later steps can reuse it.
          echo "RMQ_AUTH=Basic $b64" >> $env:GITHUB_ENV
      - name: B3. Bootstrap exchange + queue (management API)
        run: |
          $headers = @{ Authorization = $env:RMQ_AUTH; 'Content-Type' = 'application/json' }
          Invoke-RestMethod -Method Put -Uri 'http://127.0.0.1:15672/api/exchanges/%2F/assessment' `
              -Headers $headers -Body '{"type":"direct","durable":true}' | Out-Null
          foreach ($q in @('server.metrics', 'server.inventory')) {
              Invoke-RestMethod -Method Put -Uri "http://127.0.0.1:15672/api/queues/%2F/$q" `
                  -Headers $headers -Body '{"durable":true}' | Out-Null
              Invoke-RestMethod -Method Post -Uri "http://127.0.0.1:15672/api/bindings/%2F/e/assessment/q/$q" `
                  -Headers $headers -Body "{`"routing_key`":`"$q`"}" | Out-Null
          }
          Write-Host "Topology bootstrapped: exchange + 2 queues + 2 bindings"
      - name: B4. Seed agent.env (broker connectable, plain TCP)
        run: |
          $env_text = @'
          RABBITMQ_HOST=127.0.0.1
          RABBITMQ_PORT=5672
          RABBITMQ_VHOST=/
          RABBITMQ_USER=guest
          RABBITMQ_TLS_ENABLED=false
          RABBITMQ_EXCHANGE=assessment
          RABBITMQ_ROUTING_KEY_INVENTORY=server.inventory
          RABBITMQ_ROUTING_KEY_METRICS=server.metrics
          RABBITMQ_ROUTING_KEY_ERROR=server.error
          AGENT_INTERVAL_SEC=5
          AGENT_INVENTORY_REFRESH_SEC=0
          WORKER_DOWNLOAD_ALLOWED_HOSTS=
          '@
          $base = Join-Path $env:LOCALAPPDATA 'assessment-agent'
          New-Item -ItemType Directory -Force -Path $base | Out-Null
          [IO.File]::WriteAllText((Join-Path $base 'agent.env'), $env_text, (New-Object Text.UTF8Encoding $false))
          [IO.File]::WriteAllText((Join-Path $base 'agent.env.local'), "RABBITMQ_PASS=guest`n", (New-Object Text.UTF8Encoding $false))
      - name: B5. install (no --image-prep) — scheduled task must start the agent
        run: $null | .\dist\assessment-agent.exe install
      - name: B6. agent process running
        run: |
          $p = $null
          for ($i=0; $i -lt 20; $i++) {
              $p = Get-Process -Name assessment-agent -ErrorAction SilentlyContinue
              if ($p) { break }
              Start-Sleep -Seconds 2
          }
          if (-not $p) { throw "B6: assessment-agent process not running after task start" }
          Write-Host "agent PID(s): $($p.Id -join ',')"
      - name: B7. agent.env.local exists + user-private (no system ACL expected)
        run: |
          $f = Join-Path $env:LOCALAPPDATA 'assessment-agent\agent.env.local'
          if (-not (Test-Path $f)) { throw "B7: $f missing" }
          if ((Get-Content $f -Raw) -notmatch 'RABBITMQ_PASS') { throw "B7: secret not written" }
      - name: B8. Publish reaches queue (metrics)
        run: |
          $headers = @{ Authorization = $env:RMQ_AUTH; 'Content-Type' = 'application/json' }
          $depth = 0
          for ($i=0; $i -lt 20; $i++) {
              try {
                  $r = Invoke-RestMethod -Uri 'http://127.0.0.1:15672/api/queues/%2F/server.metrics' -Headers $headers
                  $depth = [int]$r.messages
                  if ($depth -gt 0) { break }
              } catch {}
              Start-Sleep -Seconds 2
          }
          if ($depth -le 0) { throw "B8: no metrics published in 40s" }
          Write-Host "queue depth=$depth"
          # peek a message via management API
          $msgs = Invoke-RestMethod -Method Post -Uri 'http://127.0.0.1:15672/api/queues/%2F/server.metrics/get' `
              -Headers $headers -Body '{"count":1,"ackmode":"ack_requeue_false","encoding":"auto","truncate":50000}'
          $msgs | ConvertTo-Json -Depth 10 | Tee-Object -FilePath metric.json | Out-Null
          $payload = $msgs[0].payload
          Write-Host $payload
          if ($payload -notmatch '"message_type"') { throw "B8: missing message_type" }
          if ($payload -notmatch '"machine_id"')   { throw "B8: missing machine_id" }
      - name: B9. Upgrade — install twice, agent restarts
        run: |
          $pid_before = (Get-Process -Name assessment-agent -ErrorAction SilentlyContinue | Select-Object -First 1).Id
          $null | .\dist\assessment-agent.exe install
          $p = $null
          for ($i=0; $i -lt 20; $i++) {
              $p = Get-Process -Name assessment-agent -ErrorAction SilentlyContinue
              if ($p -and ($p[0].Id -ne $pid_before)) { break }
              Start-Sleep -Seconds 2
          }
          if (-not $p) { throw "B9: agent not running after upgrade" }
          $pid_after = $p[0].Id
          if ($pid_before -eq $pid_after) { throw "B9: upgrade did not restart (PID unchanged=$pid_before)" }
          Write-Host "upgrade PID: $pid_before -> $pid_after"
      - name: B10. uninstall (state preserved)
        run: |
          .\dist\assessment-agent.exe uninstall
          & schtasks /Query /TN AssessmentAgent 2>$null | Out-Null
          $exists = ($LASTEXITCODE -eq 0); $global:LASTEXITCODE = 0
          if ($exists) { throw "B10: task still registered" }
          if (-not (Test-Path (Join-Path $env:LOCALAPPDATA 'assessment-agent'))) { throw "B10: state wiped" }

  # ============================================================
  # Release 잡 — tag v* push 시에만 실행. 두 artifact 다운로드 → GitHub
  # Release 페이지에 첨부. body 는 자동 생성 (PR / commit history 기반).
  # ============================================================
  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact layout
        run: |
          mkdir -p release
          # Modern artifacts are REQUIRED — fail loudly if missing.
          cp artifacts/assessment-agent-linux-x86_64/assessment-agent-linux-x86_64 release/
          cp artifacts/assessment-agent-windows-x86_64/assessment-agent.exe release/
          # Optional profiles (experimental) — attach only if their build job
          # produced an artifact. A missing one is fine (continue-on-error).
          cp artifacts/assessment-agent-linux-x86_64-glibc2.12/assessment-agent-linux-x86_64-glibc2.12 release/ 2>/dev/null \
            || echo "[release] no Linux legacy (CentOS 6) artifact — skipped"
          cp artifacts/assessment-agent-windows-x86_64-win7/assessment-agent-win7.exe release/ 2>/dev/null \
            || echo "[release] no Windows win7 artifact — skipped"
          cp artifacts/assessment-agent-windows-x86_64-legacy/assessment-agent-legacy.exe release/ 2>/dev/null \
            || echo "[release] no Windows legacy (Server 2003) artifact — skipped"
          # Aggregate every SHA256SUMS that was downloaded.
          : > release/SHA256SUMS
          for d in artifacts/*/; do
            [ -f "$d/SHA256SUMS" ] && cat "$d/SHA256SUMS" >> release/SHA256SUMS
          done
          ls -la release/
          cat release/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Optional profiles may be absent — do not fail the release on them.
          fail_on_unmatched_files: false
          files: |
            release/assessment-agent-linux-x86_64
            release/assessment-agent-linux-x86_64-glibc2.12
            release/assessment-agent.exe
            release/assessment-agent-win7.exe
            release/assessment-agent-legacy.exe
            release/SHA256SUMS
