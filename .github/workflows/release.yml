name: Release Build

# 트리거:
#   - main/develop/feature/** push → 검증 빌드 (artifact upload, retention 90일)
#   - PR → 검증 빌드 (artifact 임시)
#   - tag v* push → 검증 빌드 + GitHub Release 자동 생성 + artifact 첨부
#   - workflow_dispatch → 수동 실행 (디버깅 / ad-hoc 빌드)
on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

# 같은 PR / 브랜치 내 새 push 발생 시 이전 run 자동 취소 — 중복 빌드 / 캐시 경합 회피.
concurrency:
  group: release-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# release 잡이 GitHub Release 생성 / 첨부할 수 있도록 contents:write 필요.
permissions:
  contents: write

jobs:
  # ============================================================
  # Linux 빌드 — native amd64 runner 위에서 manylinux2014 컨테이너 사용.
  # build-linux.sh 가 docker 전체 흐름 (build-prep + vendor + agent + verify
  # + release + chown) 을 캡슐화하므로 여기서는 한 줄 호출만.
  # ============================================================
  build-linux:
    name: Linux (manylinux2014 / glibc 2.17)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # vendor/ 는 6개 라이브러리 git clone + cmake/configure 빌드 결과를 모두 포함.
      # Makefile 의 버전 핀이 바뀌면 캐시 무효화 (해시 키에 Makefile 포함).
      - name: Cache vendor (Linux)
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-linux-${{ hashFiles('Makefile') }}
          restore-keys: |
            vendor-linux-

      - name: Build (Docker / manylinux2014)
        run: ./scripts/build-linux.sh

      - name: Verify artifacts
        run: |
          test -f dist/assessment-agent-linux-x86_64
          test -f dist/SHA256SUMS
          (cd dist && sha256sum -c SHA256SUMS)
          file dist/assessment-agent-linux-x86_64
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: assessment-agent-linux-x86_64
          path: |
            dist/assessment-agent-linux-x86_64
            dist/SHA256SUMS
          retention-days: 90

  # ============================================================
  # Windows 빌드 — windows-latest runner + MSYS2 mingw64 toolchain.
  # msys2/setup-msys2 action 이 build-prep.ps1 의 MSYS2 silent install 단계를
  # 대체하므로 build-windows.ps1 우회 — make 직접 호출.
  # ============================================================
  build-windows:
    name: Windows (MSYS2 / mingw64)
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: msys2 {0}
        working-directory: windows-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 + mingw64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            git
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-pkgconf
            perl

      - name: Cache vendor (Windows)
        uses: actions/cache@v4
        with:
          path: windows-agent/vendor
          key: vendor-windows-${{ hashFiles('windows-agent/Makefile') }}
          restore-keys: |
            vendor-windows-

      - name: Vendor fetch
        run: make vendor-fetch

      - name: Vendor build (static)
        run: make vendor-build

      - name: Build + release
        run: make release

      - name: Verify artifacts
        run: |
          test -f dist/assessment-agent.exe
          test -f dist/SHA256SUMS
          (cd dist && sha256sum -c SHA256SUMS)
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: assessment-agent-windows-x86_64
          path: |
            windows-agent/dist/assessment-agent.exe
            windows-agent/dist/SHA256SUMS
          retention-days: 90

  # ============================================================
  # Installer smoke — Linux runner 의 sudo + systemd 와 Windows runner 의
  # Administrator + SCM 을 활용해서 self-installer 서브커맨드를 실제로 한 번
  # 돌려봄. stdin 을 닫고 시작 → env-setup 의 prompt 가 EOF 를 받아 default
  # 로 떨어지므로 broker 자격증명 없이도 install --image-prep 까지 진입 가능.
  # 실제 service start 는 broker 가 없어 일부러 안 함 (--image-prep).
  # ============================================================
  # ------------------------------------------------------------
  # Linux installer smoke — broker(rabbitmq:3 docker) 까지 띄우고:
  #   1. install --image-prep flow  (서비스 등록만)
  #   2. install flow (broker 있는 상태에서 service start → publish 도달 검증)
  #   3. ACL / mode / ownership 검증
  #   4. 업그레이드 (install 두 번 → service stop → exe 교체 → restart)
  #   5. /tmp 임시 디렉토리 정리 확인
  #   6. dev path (deploy/install.sh + INSTALLER_SELF_PATH 미설정) 호환 검증
  #   7. uninstall (env 보존) + uninstall --purge (state + user 정리)
  # ------------------------------------------------------------
  install-smoke-linux:
    name: Linux installer smoke
    needs: build-linux
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (dev path 검증용)
        uses: actions/checkout@v4
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: assessment-agent-linux-x86_64
          path: dist
      - name: chmod
        run: chmod +x dist/assessment-agent-linux-x86_64

      # ---------- Phase A: --image-prep flow ----------
      - name: A1. install --image-prep
        run: sudo ./dist/assessment-agent-linux-x86_64 install --image-prep < /dev/null
      - name: A2. Verify registered (Stopped) + files + user
        run: |
          systemctl is-enabled assessment-agent
          test "$(systemctl is-active assessment-agent || true)" != "active"
          test -f /etc/systemd/system/assessment-agent.service
          test -f /usr/local/bin/assessment-agent
          test -f /etc/assessment-agent/agent.env
          id assessment-agent
          getent group assessment-agent
      - name: A3. ACL — agent.env (0640 root:assessment-agent)
        run: |
          mode=$(stat -c '%a' /etc/assessment-agent/agent.env)
          own=$(stat -c '%U:%G' /etc/assessment-agent/agent.env)
          [ "$mode" = "640" ] || { echo "expected 0640, got $mode"; exit 1; }
          [ "$own"  = "root:assessment-agent" ] || { echo "expected root:assessment-agent, got $own"; exit 1; }
      - name: A4. /tmp bundle cleaned
        run: |
          leftover=$(ls -d /tmp/agent-installer-* 2>/dev/null || true)
          [ -z "$leftover" ] || { echo "leftover bundle: $leftover"; exit 1; }
      - name: A5. prep-image clears /etc/machine-id
        run: |
          sudo ./dist/assessment-agent-linux-x86_64 prep-image
          test ! -s /etc/machine-id
      - name: A6. uninstall (env preserved)
        run: |
          sudo ./dist/assessment-agent-linux-x86_64 uninstall
          ! test -f /etc/systemd/system/assessment-agent.service
          ! test -f /usr/local/bin/assessment-agent
          test -f /etc/assessment-agent/agent.env

      # ---------- Phase B: broker + full install flow ----------
      - name: B1. Start RabbitMQ container
        run: |
          docker run -d --name rmq -p 5672:5672 rabbitmq:3
          for i in $(seq 1 60); do
            if docker exec rmq rabbitmq-diagnostics -q ping >/dev/null 2>&1; then break; fi
            sleep 1
          done
          docker exec rmq rabbitmq-diagnostics -q ping
      - name: B2. Bootstrap exchange + queue (engine topology surrogate)
        run: |
          docker exec rmq rabbitmqadmin declare exchange name=assessment type=direct durable=true
          docker exec rmq rabbitmqadmin declare queue    name=server.metrics durable=true
          docker exec rmq rabbitmqadmin declare binding  source=assessment destination=server.metrics routing_key=server.metrics
          docker exec rmq rabbitmqadmin declare queue    name=server.inventory durable=true
          docker exec rmq rabbitmqadmin declare binding  source=assessment destination=server.inventory routing_key=server.inventory
      - name: B3. Seed agent.env (broker connectable, plain TCP)
        run: |
          sudo mkdir -p /etc/assessment-agent
          sudo tee /etc/assessment-agent/agent.env >/dev/null <<'EOF'
          RABBITMQ_HOST=127.0.0.1
          RABBITMQ_PORT=5672
          RABBITMQ_VHOST=/
          RABBITMQ_USER=guest
          RABBITMQ_TLS_ENABLED=false
          RABBITMQ_EXCHANGE=assessment
          RABBITMQ_ROUTING_KEY_INVENTORY=server.inventory
          RABBITMQ_ROUTING_KEY_METRICS=server.metrics
          RABBITMQ_ROUTING_KEY_ERROR=server.error
          AGENT_INTERVAL_SEC=5
          AGENT_INVENTORY_REFRESH_SEC=0
          WORKER_DOWNLOAD_ALLOWED_HOSTS=
          EOF
          sudo tee /etc/assessment-agent/agent.env.local >/dev/null <<'EOF'
          RABBITMQ_PASS=guest
          EOF
      - name: B4. install (no --image-prep) — service must reach active
        run: sudo ./dist/assessment-agent-linux-x86_64 install < /dev/null
      - name: B5. systemctl is-active + journal sanity
        run: |
          systemctl is-active assessment-agent
          sudo journalctl -u assessment-agent -n 30 --no-pager
      - name: B6. Publish reaches queue (metrics + inventory)
        run: |
          for i in $(seq 1 20); do
            depth=$(docker exec rmq rabbitmqctl list_queues -p / name messages --no-table-headers 2>/dev/null \
                    | awk '/^server\.metrics/ {print $2}')
            [ -n "$depth" ] && [ "$depth" -gt 0 ] && break
            sleep 2
          done
          docker exec rmq rabbitmqctl list_queues -p / name messages
          [ "$depth" -gt 0 ] || { echo "no metrics published in 40s"; exit 1; }
          # peek a message — must contain message_type=metrics
          docker exec rmq rabbitmqadmin get queue=server.metrics ackmode=ack_requeue_false count=1 \
            | tee /tmp/metric.json
          grep -q '"message_type"' /tmp/metric.json || { echo "payload missing message_type"; exit 1; }
          grep -q '"machine_id"'   /tmp/metric.json || { echo "payload missing machine_id"; exit 1; }
      - name: B7. ACL — agent.env.local (0600 root:assessment-agent)
        run: |
          mode=$(stat -c '%a' /etc/assessment-agent/agent.env.local)
          own=$(stat -c '%U:%G' /etc/assessment-agent/agent.env.local)
          [ "$mode" = "600" ] || { echo "expected 0600, got $mode"; exit 1; }
          [ "$own"  = "root:assessment-agent" ] || { echo "expected root:assessment-agent, got $own"; exit 1; }
      - name: B8. Upgrade flow — install twice, service stays active
        run: |
          pid_before=$(systemctl show -p MainPID --value assessment-agent)
          sudo ./dist/assessment-agent-linux-x86_64 install < /dev/null
          sleep 3
          systemctl is-active assessment-agent
          pid_after=$(systemctl show -p MainPID --value assessment-agent)
          [ "$pid_before" != "$pid_after" ] || { echo "upgrade did not restart (PID unchanged=$pid_before)"; exit 1; }
          echo "upgrade PID: $pid_before -> $pid_after"

      # ---------- Phase C: dev path (deploy/install.sh 직접) ----------
      - name: C1. uninstall + Verify removal
        run: |
          sudo ./dist/assessment-agent-linux-x86_64 uninstall
          ! test -f /usr/local/bin/assessment-agent
      - name: C2. Stage dist for dev install.sh path
        run: |
          mkdir -p dev-stage/dist
          cp dist/assessment-agent-linux-x86_64 dev-stage/dist/
          cp -r deploy dev-stage/
          (cd dev-stage/dist && sha256sum assessment-agent-linux-x86_64 > SHA256SUMS)
      - name: C3. sudo ./deploy/install.sh < /dev/null (no INSTALLER_SELF_PATH)
        run: |
          cd dev-stage
          sudo ./deploy/install.sh < /dev/null
          systemctl is-active assessment-agent

      # ---------- Phase D: --purge cleanup ----------
      - name: D1. uninstall --purge wipes state + user
        run: |
          sudo ./dist/assessment-agent-linux-x86_64 uninstall --purge
          ! test -d /etc/assessment-agent
          ! test -d /var/lib/agent-worker
          ! id assessment-agent 2>/dev/null
          ! getent group assessment-agent 2>/dev/null

  # ------------------------------------------------------------
  # Windows installer smoke — chocolatey RabbitMQ 까지 띄우고:
  #   1. install --image-prep flow
  #   2. install flow (broker 있는 상태에서 service start → publish 도달)
  #   3. SCM BinaryPath 가 따옴표로 감싸졌는지 (sc qc)
  #   4. ACL — agent.env.local 이 SYSTEM + Administrators 만인지 (Get-Acl)
  #   5. 업그레이드 (install 두 번)
  #   6. uninstall + Verify
  # ------------------------------------------------------------
  install-smoke-windows:
    name: Windows installer smoke
    needs: build-windows
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: assessment-agent-windows-x86_64
          path: dist

      # ---------- Phase A: --image-prep flow ----------
      - name: A1. install --image-prep
        run: $null | .\dist\assessment-agent.exe install --image-prep
      - name: A2. Verify registered (Stopped) + files + ACL on env.local
        run: |
          $svc = Get-Service -Name assessment-agent
          if ($svc.Status -ne 'Stopped')      { throw "A2: expected Stopped, got $($svc.Status)" }
          if ($svc.StartType -ne 'Automatic') { throw "A2: expected Automatic, got $($svc.StartType)" }
          foreach ($p in @(
              'C:\Program Files\assessment-agent\assessment-agent.exe',
              'C:\ProgramData\assessment-agent\agent.env',
              'C:\ProgramData\assessment-agent\worker\results',
              'C:\ProgramData\assessment-agent\worker\done',
              'C:\ProgramData\assessment-agent\worker\running')) {
              if (-not (Test-Path $p)) { throw "A2: missing $p" }
          }
      - name: A3. SCM BinaryPath is quoted (space-safe)
        run: |
          $out = (& sc.exe qc assessment-agent | Out-String)
          Write-Host $out
          if ($out -notmatch '\"C:\\Program Files\\assessment-agent\\assessment-agent\.exe\"') {
              throw "A3: BinaryPath is not quoted: $out"
          }
      - name: A4. prep-image regenerates MachineGuid
        run: |
          $before = (Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Cryptography' MachineGuid).MachineGuid
          .\dist\assessment-agent.exe prep-image
          $after = (Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Cryptography' MachineGuid).MachineGuid
          if ($before -eq $after) { throw "A4: MachineGuid did not change" }
          Write-Host "MachineGuid: $before -> $after"
      - name: A5. uninstall (state preserved)
        run: |
          .\dist\assessment-agent.exe uninstall
          $svc = Get-Service -Name assessment-agent -ErrorAction SilentlyContinue
          if ($svc) { throw "A5: service still registered: $($svc.Status)" }
          if (-not (Test-Path 'C:\ProgramData\assessment-agent')) { throw "A5: state dir wiped" }

      # ---------- Phase B: broker + full install flow ----------
      - name: B1. Install RabbitMQ via Chocolatey
        run: |
          choco install rabbitmq --no-progress -y
          # chocolatey starts the service; just wait until it answers.
          $deadline = (Get-Date).AddMinutes(5)
          while ((Get-Date) -lt $deadline) {
            $svc = Get-Service -Name RabbitMQ -ErrorAction SilentlyContinue
            if ($svc -and $svc.Status -eq 'Running') { break }
            Start-Sleep -Seconds 5
          }
          Get-Service RabbitMQ
      - name: B2. Locate rabbitmqctl / rabbitmqadmin
        id: rmqpath
        run: |
          $sbin = (Get-ChildItem 'C:\Program Files\RabbitMQ Server\*\sbin' -Directory | Select-Object -First 1).FullName
          if (-not $sbin) { throw "RabbitMQ sbin not found under C:\Program Files\RabbitMQ Server" }
          Write-Host "sbin: $sbin"
          echo "SBIN=$sbin" >> $env:GITHUB_ENV
          echo "RABBITMQCTL=$sbin\rabbitmqctl.bat" >> $env:GITHUB_ENV
          # rabbitmqadmin is a python script bundled with the management plugin.
          & "$sbin\rabbitmq-plugins.bat" enable rabbitmq_management
          $deadline = (Get-Date).AddMinutes(2)
          while ((Get-Date) -lt $deadline) {
            try { (Invoke-WebRequest -Uri 'http://localhost:15672/cli/rabbitmqadmin' -UseBasicParsing -TimeoutSec 5) | Out-Null; break }
            catch { Start-Sleep -Seconds 5 }
          }
          Invoke-WebRequest -Uri 'http://localhost:15672/cli/rabbitmqadmin' -UseBasicParsing -OutFile rabbitmqadmin.py
          echo "RABBITMQADMIN=python rabbitmqadmin.py" >> $env:GITHUB_ENV
      - name: B3. Bootstrap exchange + queue
        run: |
          & python rabbitmqadmin.py declare exchange name=assessment type=direct durable=true
          & python rabbitmqadmin.py declare queue    name=server.metrics  durable=true
          & python rabbitmqadmin.py declare binding  source=assessment destination=server.metrics  routing_key=server.metrics
          & python rabbitmqadmin.py declare queue    name=server.inventory durable=true
          & python rabbitmqadmin.py declare binding  source=assessment destination=server.inventory routing_key=server.inventory
      - name: B4. Seed agent.env (broker connectable, plain TCP)
        run: |
          $env_text = @'
          RABBITMQ_HOST=127.0.0.1
          RABBITMQ_PORT=5672
          RABBITMQ_VHOST=/
          RABBITMQ_USER=guest
          RABBITMQ_TLS_ENABLED=false
          RABBITMQ_EXCHANGE=assessment
          RABBITMQ_ROUTING_KEY_INVENTORY=server.inventory
          RABBITMQ_ROUTING_KEY_METRICS=server.metrics
          RABBITMQ_ROUTING_KEY_ERROR=server.error
          AGENT_INTERVAL_SEC=5
          AGENT_INVENTORY_REFRESH_SEC=0
          WORKER_DOWNLOAD_ALLOWED_HOSTS=
          '@
          New-Item -ItemType Directory -Force -Path 'C:\ProgramData\assessment-agent' | Out-Null
          [IO.File]::WriteAllText('C:\ProgramData\assessment-agent\agent.env', $env_text, (New-Object Text.UTF8Encoding $false))
          [IO.File]::WriteAllText('C:\ProgramData\assessment-agent\agent.env.local', "RABBITMQ_PASS=guest`n", (New-Object Text.UTF8Encoding $false))
      - name: B5. install (no --image-prep) — service must reach Running
        run: $null | .\dist\assessment-agent.exe install
      - name: B6. Get-Service Running
        run: |
          $svc = Get-Service -Name assessment-agent
          if ($svc.Status -ne 'Running') { throw "B6: expected Running, got $($svc.Status)" }
      - name: B7. ACL — agent.env.local restricted to SYSTEM + Administrators
        run: |
          $acl = Get-Acl 'C:\ProgramData\assessment-agent\agent.env.local'
          $idents = $acl.Access | ForEach-Object { $_.IdentityReference.Value } | Sort-Object -Unique
          Write-Host ($idents -join '; ')
          $expected = @('BUILTIN\Administrators','NT AUTHORITY\SYSTEM')
          foreach ($i in $idents) {
              if ($expected -notcontains $i) { throw "B7: unexpected ACE for $i" }
          }
          foreach ($e in $expected) {
              if ($idents -notcontains $e) { throw "B7: missing ACE for $e" }
          }
      - name: B8. Publish reaches queue (metrics)
        run: |
          $depth = 0
          for ($i=0; $i -lt 20; $i++) {
              $line = (& $env:RABBITMQCTL list_queues name messages --no-table-headers 2>$null | Select-String 'server.metrics')
              if ($line) {
                  $depth = [int]($line -split '\s+')[1]
                  if ($depth -gt 0) { break }
              }
              Start-Sleep -Seconds 2
          }
          if ($depth -le 0) { throw "B8: no metrics published in 40s" }
          # peek payload
          & python rabbitmqadmin.py get queue=server.metrics ackmode=ack_requeue_false count=1 | Tee-Object -FilePath metric.json
          if (-not (Select-String -Path metric.json -Pattern '"message_type"' -Quiet)) { throw "B8: missing message_type" }
          if (-not (Select-String -Path metric.json -Pattern '"machine_id"'   -Quiet)) { throw "B8: missing machine_id" }
      - name: B9. Upgrade — install twice, service stays Running
        run: |
          $pid_before = (Get-CimInstance Win32_Service -Filter "Name='assessment-agent'").ProcessId
          $null | .\dist\assessment-agent.exe install
          Start-Sleep -Seconds 3
          $svc = Get-Service -Name assessment-agent
          if ($svc.Status -ne 'Running') { throw "B9: not Running after upgrade ($($svc.Status))" }
          $pid_after = (Get-CimInstance Win32_Service -Filter "Name='assessment-agent'").ProcessId
          if ($pid_before -eq $pid_after) { throw "B9: upgrade did not restart (PID unchanged=$pid_before)" }
          Write-Host "upgrade PID: $pid_before -> $pid_after"
      - name: B10. uninstall (state preserved)
        run: |
          .\dist\assessment-agent.exe uninstall
          $svc = Get-Service -Name assessment-agent -ErrorAction SilentlyContinue
          if ($svc) { throw "B10: service still registered" }
          if (-not (Test-Path 'C:\ProgramData\assessment-agent')) { throw "B10: state wiped" }

  # ============================================================
  # Release 잡 — tag v* push 시에만 실행. 두 artifact 다운로드 → GitHub
  # Release 페이지에 첨부. body 는 자동 생성 (PR / commit history 기반).
  # ============================================================
  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact layout
        run: |
          mkdir -p release
          cp artifacts/assessment-agent-linux-x86_64/assessment-agent-linux-x86_64 release/
          cp artifacts/assessment-agent-windows-x86_64/assessment-agent.exe release/
          # Aggregate SHA256SUMS (Linux + Windows in one file)
          {
            cat artifacts/assessment-agent-linux-x86_64/SHA256SUMS
            cat artifacts/assessment-agent-windows-x86_64/SHA256SUMS
          } > release/SHA256SUMS
          ls -la release/
          cat release/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/assessment-agent-linux-x86_64
            release/assessment-agent.exe
            release/SHA256SUMS
